<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocks Survival</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
    text-align:center;
    color:white;
}

h1{
    margin:10px;
}

canvas{
    display:block;
    margin:auto;
    background:#222;
    border:4px solid white;
}

</style>
</head>
<body>

<h1>🧱 Blocks Survival</h1>

<canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gravity = 0.6;

const player = {
    x: 200,
    y: 100,
    width: 40,
    height: 60,
    velocityX: 0,
    velocityY: 0,
    speed: 5,
    jumpPower: -13,
    grounded: false
};

const keys = {};

let blocks = [];
let gameOver = false;
let score = 0;

document.addEventListener("keydown", (e)=>{

    keys[e.key] = true;

    if(
        (e.key === " " || e.key === "z" || e.key === "ArrowUp")
        && player.grounded
    ){
        player.velocityY = player.jumpPower;
        player.grounded = false;
    }
});

document.addEventListener("keyup", (e)=>{
    keys[e.key] = false;
});

function createBlock(){

    const size = 50 + Math.random() * 50;

    blocks.push({
        x: Math.random() * (canvas.width - size),
        y: -100,
        width: size,
        height: size,
        velocityY: 0,
        landed: false,
        color: `hsl(${Math.random()*360},70%,50%)`
    });
}

setInterval(()=>{

    if(!gameOver){
        createBlock();
    }

}, 1000);

function rectCollision(a,b){

    return(
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

function movePlayer(){

    // déplacement horizontal
    player.velocityX = 0;

    if(keys["ArrowLeft"] || keys["q"]){
        player.velocityX = -player.speed;
    }

    if(keys["ArrowRight"] || keys["d"]){
        player.velocityX = player.speed;
    }

    // mouvement horizontal
    player.x += player.velocityX;

    // collision horizontale
    for(let block of blocks){

        if(block.landed && rectCollision(player, block)){

            if(player.velocityX > 0){
                player.x = block.x - player.width;
            }

            if(player.velocityX < 0){
                player.x = block.x + block.width;
            }
        }
    }

    // gravité
    player.velocityY += gravity;
    player.y += player.velocityY;

    player.grounded = false;

    // collision verticale blocs
    for(let block of blocks){

        if(block.landed && rectCollision(player, block)){

            // tombe dessus
            if(player.velocityY > 0){

                player.y = block.y - player.height;
                player.velocityY = 0;
                player.grounded = true;
            }

            // tape dessous
            else if(player.velocityY < 0){

                player.y = block.y + block.height;
                player.velocityY = 0;
            }
        }

        // danger seulement si le bloc tombe
        if(!block.landed && rectCollision(player, block)){
            gameOver = true;
        }
    }

    // sol
    if(player.y + player.height >= canvas.height){

        player.y = canvas.height - player.height;
        player.velocityY = 0;
        player.grounded = true;
    }

    // limites écran
    if(player.x < 0){
        player.x = 0;
    }

    if(player.x + player.width > canvas.width){
        player.x = canvas.width - player.width;
    }
}

function updateBlocks(){

    for(let block of blocks){

        if(!block.landed){

            block.velocityY += gravity;
            block.y += block.velocityY;

            // collision sol
            if(block.y + block.height >= canvas.height){

                block.y = canvas.height - block.height;
                block.velocityY = 0;
                block.landed = true;
            }

            // collision autres blocs
            for(let other of blocks){

                if(block === other) continue;

                if(
                    other.landed &&
                    block.x < other.x + other.width &&
                    block.x + block.width > other.x &&
                    block.y + block.height >= other.y &&
                    block.y + block.height <= other.y + 20
                ){

                    block.y = other.y - block.height;
                    block.velocityY = 0;
                    block.landed = true;
                }
            }
        }
    }
}

function drawPlayer(){

    // jambes
    ctx.fillStyle = "#444";

    ctx.fillRect(player.x + 5, player.y + 45, 10, 20);
    ctx.fillRect(player.x + 25, player.y + 45, 10, 20);

    // corps
    ctx.fillStyle = "#2ecc71";

    ctx.fillRect(player.x, player.y + 15, 40, 35);

    // bras
    ctx.fillRect(player.x - 8, player.y + 18, 8, 25);
    ctx.fillRect(player.x + 40, player.y + 18, 8, 25);

    // tête
    ctx.fillStyle = "#f5cba7";

    ctx.fillRect(player.x + 5, player.y - 10, 30, 25);

    // yeux
    ctx.fillStyle = "black";

    ctx.fillRect(player.x + 11, player.y - 2, 4, 4);
    ctx.fillRect(player.x + 24, player.y - 2, 4, 4);

    // bouche
    ctx.fillRect(player.x + 16, player.y + 7, 8, 2);
}

function drawBlocks(){

    for(let block of blocks){

        ctx.fillStyle = block.color;

        ctx.fillRect(
            block.x,
            block.y,
            block.width,
            block.height
        );

        ctx.strokeStyle = "black";

        ctx.strokeRect(
            block.x,
            block.y,
            block.width,
            block.height
        );
    }
}

function drawScore(){

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";

    ctx.fillText(
        "Score : " + score,
        20,
        40
    );
}

function drawGameOver(){

    ctx.fillStyle = "red";
    ctx.font = "70px Arial";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2 - 220,
        canvas.height/2
    );

    ctx.font = "30px Arial";

    ctx.fillText(
        "Recharge la page pour recommencer",
        canvas.width/2 - 220,
        canvas.height/2 + 60
    );
}

function update(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(!gameOver){

        score++;

        movePlayer();
        updateBlocks();
    }

    drawBlocks();
    drawPlayer();
    drawScore();

    if(gameOver){
        drawGameOver();
    }

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
